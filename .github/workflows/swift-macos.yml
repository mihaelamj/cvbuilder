name: Swift (macOS)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: |
          swift build --target CVBuilder
          swift build --target CVBuilderCLI
          swift build --product cvbuilder

      - name: Test
        run: swift test
