name: Swift (macOS)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Format and lint
        run: |
          brew install swiftformat swiftlint
          swiftformat . --config .swiftformat --lint
          swiftlint --config .swiftlint.yml --strict

      - name: Build
        run: |
          swift build --target CVBuilder
          swift build --target CVBuilderCLI
          swift build --target CVBuilderTileDown
          swift build --product cvbuilder

      - name: Test
        run: swift test

      - name: Documentation
        run: |
          set -o pipefail
          swift package generate-documentation --target CVBuilderDocumentation 2>&1 | tee docc-output.log
          if grep -q "warning:" docc-output.log; then
            echo "documentation: DocC reported warnings" >&2
            exit 1
          fi

      - name: Schema drift
        run: bash scripts/check-schema-drift.sh

      - name: Generated fixture freshness
        run: bash scripts/check-generated-fixtures.sh

      - name: Consumer smoke
        run: bash scripts/check-consumer-smoke.sh
