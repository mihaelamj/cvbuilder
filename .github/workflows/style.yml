name: Style and namespacing

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  style:
    name: Style and namespacing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Style gate
        run: bash scripts/check-style.sh

      - name: Namespacing gate
        run: bash scripts/check-namespacing.sh

      - name: Quality gate tests
        run: bash scripts/test-quality-gates.sh

      - name: PR roadmap gate
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bash scripts/check-pr-roadmap.sh
